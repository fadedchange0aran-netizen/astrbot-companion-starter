<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Companion MCP Admin Controls</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 24px; background: #111827; color: #e5e7eb; }
    h1, h2 { margin: 0 0 12px; }
    .card { background: #1f2937; border: 1px solid #374151; border-radius: 10px; padding: 16px; margin-bottom: 16px; }
    .row { display: flex; gap: 8px; flex-wrap: wrap; margin: 8px 0; }
    label { display: inline-flex; align-items: center; gap: 6px; margin-right: 12px; }
    input[type="text"], input[type="password"] { width: 100%; max-width: 480px; padding: 8px; border-radius: 8px; border: 1px solid #4b5563; background: #0f172a; color: #e5e7eb; }
    button { padding: 8px 12px; border-radius: 8px; border: 1px solid #4b5563; background: #2563eb; color: white; cursor: pointer; }
    button.secondary { background: #374151; }
    pre { white-space: pre-wrap; word-break: break-word; background: #0f172a; padding: 12px; border-radius: 8px; border: 1px solid #374151; }
    .hint { color: #9ca3af; font-size: 14px; }
  </style>
</head>
<body>
  <h1>Companion MCP Admin Controls</h1>
  <p class="hint">先输入 Bearer Token，再读取或修改状态。默认可用 `ARANBOX_ADMIN_CONTROL_TOKEN`，未配置时回退到 adapter token。</p>

  <div class="card">
    <h2>认证</h2>
    <input id="token" type="password" placeholder="输入 Bearer Token">
    <div class="row">
      <button onclick="refreshStatus()">读取当前状态</button>
    </div>
  </div>

  <div class="card">
    <h2>MCP 工具层</h2>
    <div class="row">
      <label><input id="layer-daily" type="checkbox">日常层</label>
      <label><input id="layer-extended" type="checkbox">扩展层</label>
      <label><input id="layer-admin" type="checkbox">管理层</label>
    </div>
    <div class="row">
      <button onclick="saveToolLayers()">保存工具层状态</button>
    </div>
  </div>

  <div class="card">
    <h2>Safe Deploy</h2>
    <div class="row">
      <label><input id="safe-enabled" type="checkbox">开启 safe deploy</label>
    </div>
    <div class="row">
      <label><input id="group-inspect" type="checkbox">只读检查</label>
      <label><input id="group-plugin" type="checkbox">插件部署</label>
      <label><input id="group-restart" type="checkbox">服务重启</label>
    </div>
    <div class="row">
      <button onclick="saveSafeDeploy()">保存 safe deploy 策略</button>
    </div>
  </div>

  <div class="card">
    <h2>一次性管理授权</h2>
    <input id="grant-note" type="text" placeholder="可选备注，例如：只允许这轮重启 mcp">
    <div class="row">
      <button onclick="grantAdminOnce()">开启 /管理一轮 等效授权</button>
      <button class="secondary" onclick="clearAdminOnce()">取消一次性授权</button>
    </div>
  </div>

  <div class="card">
    <h2>状态输出</h2>
    <pre id="output">尚未读取。</pre>
  </div>

  <script>
    function authHeaders() {
      const token = document.getElementById("token").value.trim();
      return {
        "Content-Type": "application/json",
        "Authorization": "Bearer " + token
      };
    }

    async function requestJson(url, options) {
      const response = await fetch(url, options);
      const payload = await response.json();
      if (!response.ok) {
        throw new Error(payload.error || ("HTTP " + response.status));
      }
      return payload;
    }

    function setOutput(payload) {
      document.getElementById("output").textContent = JSON.stringify(payload, null, 2);
    }

    function applyStatus(payload) {
      const layers = new Set((payload.tool_layers && payload.tool_layers.enabled_layers) || []);
      document.getElementById("layer-daily").checked = layers.has("daily");
      document.getElementById("layer-extended").checked = layers.has("extended");
      document.getElementById("layer-admin").checked = layers.has("admin");

      const safeDeploy = payload.safe_deploy || {};
      const groups = new Set(safeDeploy.allowed_groups || []);
      document.getElementById("safe-enabled").checked = !!safeDeploy.enabled;
      document.getElementById("group-inspect").checked = groups.has("inspect");
      document.getElementById("group-plugin").checked = groups.has("plugin_deploy");
      document.getElementById("group-restart").checked = groups.has("service_restart");

      setOutput(payload);
    }

    async function refreshStatus() {
      try {
        const payload = await requestJson("/admin-api/status", {
          method: "GET",
          headers: authHeaders()
        });
        applyStatus(payload);
      } catch (error) {
        setOutput({ ok: false, error: String(error) });
      }
    }

    async function saveToolLayers() {
      try {
        const enabledLayers = [];
        if (document.getElementById("layer-daily").checked) enabledLayers.push("daily");
        if (document.getElementById("layer-extended").checked) enabledLayers.push("extended");
        if (document.getElementById("layer-admin").checked) enabledLayers.push("admin");
        const payload = await requestJson("/admin-api/tool-layers", {
          method: "POST",
          headers: authHeaders(),
          body: JSON.stringify({ enabled_layers: enabledLayers })
        });
        setOutput(payload);
      } catch (error) {
        setOutput({ ok: false, error: String(error) });
      }
    }

    async function saveSafeDeploy() {
      try {
        const allowedGroups = [];
        if (document.getElementById("group-inspect").checked) allowedGroups.push("inspect");
        if (document.getElementById("group-plugin").checked) allowedGroups.push("plugin_deploy");
        if (document.getElementById("group-restart").checked) allowedGroups.push("service_restart");
        const payload = await requestJson("/admin-api/safe-deploy", {
          method: "POST",
          headers: authHeaders(),
          body: JSON.stringify({
            enabled: document.getElementById("safe-enabled").checked,
            allowed_groups: allowedGroups,
            extra_actions: []
          })
        });
        setOutput(payload);
      } catch (error) {
        setOutput({ ok: false, error: String(error) });
      }
    }

    async function grantAdminOnce() {
      try {
        const payload = await requestJson("/admin-api/admin-once", {
          method: "POST",
          headers: authHeaders(),
          body: JSON.stringify({
            action: "grant",
            note: document.getElementById("grant-note").value.trim(),
            granted_by: "admin-page"
          })
        });
        setOutput(payload);
      } catch (error) {
        setOutput({ ok: false, error: String(error) });
      }
    }

    async function clearAdminOnce() {
      try {
        const payload = await requestJson("/admin-api/admin-once", {
          method: "POST",
          headers: authHeaders(),
          body: JSON.stringify({ action: "clear" })
        });
        setOutput(payload);
      } catch (error) {
        setOutput({ ok: false, error: String(error) });
      }
    }
  </script>
</body>
</html>
